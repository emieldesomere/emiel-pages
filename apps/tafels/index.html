<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Tafels Oefenen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .close-btn {
      position: fixed;
      top: 15px;
      right: 20px;
      background: #ff4d4d;
      color: white;
      border: none;
      font-size: 18px;
      font-weight: bold;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
    }
    .close-btn:hover { background: #cc0000; }

    .screen {
      display: none;
      text-align: center;
      background: #16213e;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      max-width: 500px;
      width: 90%;
    }
    .screen.active { display: block; }

    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    h2 { font-size: 1.5rem; color: #a0c4ff; }

    .start-btn, .next-btn, .restart-btn {
      margin-top: 20px;
      padding: 14px 36px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .start-btn { background: #0f3460; color: white; }
    .start-btn:hover { background: #1a5276; }

    .restart-btn { background: #0f3460; color: white; }
    .restart-btn:hover { background: #1a5276; }

    /* Game screen */
    .progress {
      font-size: 0.9rem;
      color: #a0c4ff;
      margin-bottom: 20px;
    }

    .timer-bar-bg {
      background: #0f3460;
      border-radius: 10px;
      height: 16px;
      margin-bottom: 30px;
      overflow: hidden;
    }
    .timer-bar {
      height: 100%;
      border-radius: 10px;
      background: #4cc9f0;
      transition: width 0.1s linear, background 0.3s;
      width: 100%;
    }

    .question {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 20px;
      color: #e2e8f0;
    }

    #answer-input {
      font-size: 2rem;
      width: 120px;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      border: 3px solid #4cc9f0;
      background: #0f3460;
      color: white;
      outline: none;
    }
    #answer-input:focus { border-color: #a0c4ff; }

    .submit-btn {
      display: block;
      margin: 16px auto 0;
      padding: 12px 30px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      background: #4cc9f0;
      color: #1a1a2e;
    }
    .submit-btn:hover { background: #72d9f5; }

    .feedback {
      margin-top: 20px;
      font-size: 1.3rem;
      min-height: 36px;
      font-weight: bold;
    }
    .feedback.correct { color: #56d364; }
    .feedback.wrong { color: #ff7b7b; }
    .feedback.timeout { color: #ffa94d; }

    /* Score screen */
    .score-number {
      font-size: 4rem;
      font-weight: bold;
      color: #4cc9f0;
      margin: 10px 0;
    }
    .score-label { font-size: 1.2rem; color: #a0c4ff; }

    .score-emoji { font-size: 3rem; margin: 10px 0; }

    .results-list {
      margin: 20px 0;
      text-align: left;
      max-height: 250px;
      overflow-y: auto;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 1rem;
    }
    .result-item.correct { background: #1a4731; color: #56d364; }
    .result-item.wrong   { background: #4a1a1a; color: #ff7b7b; }
  </style>
</head>
<body>

<button class="close-btn" onclick="window.location.href='/index.html'">✕</button>

<!-- Start scherm -->
<div class="screen active" id="screen-start">
  <div style="font-size:3rem;">🧮</div>
  <h1>Tafels</h1>
  <p style="color:#a0c4ff;">10 vragen · 5 seconden per vraag</p>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<!-- Spel scherm -->
<div class="screen" id="screen-game">
  <div class="progress" id="progress">Vraag 1 van 10</div>
  <div class="timer-bar-bg">
    <div class="timer-bar" id="timer-bar"></div>
  </div>
  <div class="question" id="question">3 × 7 = ?</div>
  <input type="number" id="answer-input" placeholder="?" min="0" max="100" autocomplete="off">
  <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">OK</button>
  <div class="feedback" id="feedback"></div>
</div>

<!-- Score scherm -->
<div class="screen" id="screen-score">
  <div class="score-emoji" id="score-emoji">🎉</div>
  <h2>Klaar!</h2>
  <div class="score-number" id="score-display">0/10</div>
  <div class="score-label" id="score-label"></div>
  <div class="results-list" id="results-list"></div>
  <button class="restart-btn" onclick="startGame()">Opnieuw</button>
</div>

<script>
  const TOTAL = 10;
  const TIME_LIMIT = 5; // seconden

  let questions = [];
  let currentIndex = 0;
  let score = 0;
  let results = [];
  let timerInterval = null;
  let timeLeft = 0;
  let answered = false;

  function generateQuestions() {
    const qs = [];
    while (qs.length < TOTAL) {
      const a = Math.floor(Math.random() * 11);
      const b = Math.floor(Math.random() * 11);
      qs.push({ a, b, answer: a * b });
    }
    return qs;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    questions = generateQuestions();
    currentIndex = 0;
    score = 0;
    results = [];
    showScreen('screen-game');
    showQuestion();
  }

  function showQuestion() {
    answered = false;
    const q = questions[currentIndex];
    document.getElementById('progress').textContent = `Vraag ${currentIndex + 1} van ${TOTAL}`;
    document.getElementById('question').textContent = `${q.a} × ${q.b} = ?`;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').disabled = false;
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('answer-input').focus();
    startTimer();
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = TIME_LIMIT;
    updateTimerBar(1);

    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      const fraction = Math.max(0, timeLeft / TIME_LIMIT);
      updateTimerBar(fraction);

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        handleTimeout();
      }
    }, 100);
  }

  function updateTimerBar(fraction) {
    const bar = document.getElementById('timer-bar');
    bar.style.width = (fraction * 100) + '%';
    if (fraction > 0.5) bar.style.background = '#4cc9f0';
    else if (fraction > 0.25) bar.style.background = '#ffa94d';
    else bar.style.background = '#ff6b6b';
  }

  function submitAnswer() {
    if (answered) return;
    const input = document.getElementById('answer-input').value.trim();
    if (input === '') return;
    clearInterval(timerInterval);
    answered = true;

    const q = questions[currentIndex];
    const userAnswer = parseInt(input, 10);
    const isCorrect = userAnswer === q.answer;

    document.getElementById('answer-input').disabled = true;
    document.getElementById('submit-btn').disabled = true;

    if (isCorrect) {
      score++;
      showFeedback('correct', '✅ Goed zo!');
    } else {
      showFeedback('wrong', `❌ Fout! Het antwoord is ${q.answer}`);
    }

    results.push({ q, userAnswer, isCorrect, timeout: false });
    setTimeout(nextQuestion, 1400);
  }

  function handleTimeout() {
    if (answered) return;
    answered = true;
    const q = questions[currentIndex];
    document.getElementById('answer-input').disabled = true;
    document.getElementById('submit-btn').disabled = true;
    showFeedback('timeout', `⏰ Te laat! Het antwoord is ${q.answer}`);
    results.push({ q, userAnswer: null, isCorrect: false, timeout: true });
    setTimeout(nextQuestion, 1600);
  }

  function showFeedback(type, text) {
    const el = document.getElementById('feedback');
    el.textContent = text;
    el.className = 'feedback ' + type;
  }

  function nextQuestion() {
    currentIndex++;
    if (currentIndex >= TOTAL) {
      showScore();
    } else {
      showQuestion();
    }
  }

  function showScore() {
    showScreen('screen-score');
    document.getElementById('score-display').textContent = `${score}/10`;

    let emoji, label;
    if (score === 10) { emoji = '🏆'; label = 'Perfect! Alles goed!'; }
    else if (score >= 8) { emoji = '🌟'; label = 'Super goed gedaan!'; }
    else if (score >= 6) { emoji = '😊'; label = 'Goed bezig!'; }
    else if (score >= 4) { emoji = '💪'; label = 'Blijven oefenen!'; }
    else                 { emoji = '📚'; label = 'Meer oefenen nodig!'; }

    document.getElementById('score-emoji').textContent = emoji;
    document.getElementById('score-label').textContent = label;

    const list = document.getElementById('results-list');
    list.innerHTML = '';
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'result-item ' + (r.isCorrect ? 'correct' : 'wrong');
      const given = r.timeout ? '⏰' : r.userAnswer;
      const icon = r.isCorrect ? '✅' : '❌';
      div.innerHTML = `<span>${r.q.a} × ${r.q.b}</span><span>${given} → ${r.q.answer} ${icon}</span>`;
      list.appendChild(div);
    });
  }

  // Enter toets om te antwoorden
  document.getElementById('answer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitAnswer();
  });
</script>

</body>
</html>
